[tool.black]
line-length = 88
target-version = ["py310"]

exclude = '''
/(
    \.git
  | \.venv
  | venv
  | node_modules
  | migrations
  | build
  | dist
  | __pycache__
)/
'''

[tool.ruff]
exclude = [
    "migrations",
    "build",
    "venv",
    "node_modules",
    ".git",
    "dist",
    "__pycache__",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--strict-markers -v"

[tool.coverage.run]
source = ["app"]
omit = ["app/templates/*", "app/static/*", "migrations/*"]

[tool.coverage.report]
show_missing = true
fail_under = 40