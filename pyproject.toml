[tool.black]
line-length = 88
target-version = ["py310"]

exclude = '''
/(
    \.git
  | \.venv
  | venv
  | node_modules
  | migrations
  | build
  | dist
  | __pycache__
)/
'''

[tool.ruff]
exclude = [
    "migrations",
    "build",
    "venv",
    "node_modules",
    ".git",
    "dist",
    "__pycache__",
]