[mypy]
python_version = 3.10
warn_return_any = False
warn_unused_configs = True
disallow_untyped_calls = False
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-migrations.*]
ignore_errors = True

[mypy-app.extensions]
ignore_errors = True

[mypy-app.models.*]
ignore_errors = True

[mypy-app.catalogs.*]
ignore_errors = True

[mypy-app.exceptions]
ignore_errors = True
