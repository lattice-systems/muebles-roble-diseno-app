<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gestión de la tienda de muebles" />
    <meta name="author" content="Lattice Systems" />
    <meta name="keywords"
          content="muebles, gestión, colores, roles, tipos de madera, unidades de medida" />
    <title>
      {% block title %}
        Furniture Store
      {% endblock title %}
    </title>
    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='src/images/icono-roble-disenio.png') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='dist/output.css') }}">
  </head>
  <body class="overflow-hidden">
    <div class="flex flex-row gap-3 2xl:gap-4 p-3 2xl:p-4 w-full h-screen relative bg-neutral-tertiary overflow-hidden">
      <div class="inset-s-0 h-full w-fit shrink-0">{% include "components/admin/sidebar.html" %}</div>
      <div class="w-full min-w-0 z-20 h-full flex flex-col gap-3 2xl:gap-4">
        {% include "components/admin/navbar.html" %}
        <main class="flex-1 min-w-0 min-h-0 overflow-y-auto bg-neutral-primary p-4 border border-default rounded-base">
          {% block content %}
          {% endblock content %}
        </main>
      </div>
    </div>
    {% block modals %}
    {% endblock modals %}
    <script src="{{ url_for('static', filename='js/flowbite.min.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const clearClientState = function() {
                try {
                    localStorage.clear();
                } catch (error) {
                    // noop
                }

                try {
                    sessionStorage.clear();
                } catch (error) {
                    // noop
                }

                if ("caches" in window) {
                    caches
                        .keys()
                        .then(function(keys) {
                            return Promise.all(keys.map(function(key) {
                                return caches.delete(key);
                            }));
                        })
                        .catch(function() {
                            // noop
                        });
                }
            };

            document
                .querySelectorAll("form[data-logout-form='true']")
                .forEach(function(form) {
                    form.addEventListener("submit", clearClientState);
                });
        });
    </script>
  </body>
</html>
