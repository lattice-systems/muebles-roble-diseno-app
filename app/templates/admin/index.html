<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gestión de la tienda de muebles" />
    <meta name="author" content="Lattice Systems" />
    <meta name="keywords"
          content="muebles, gestión, colores, roles, tipos de madera, unidades de medida" />
    <title>
      {% block title %}
        Furniture Store
      {% endblock title %}
    </title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='dist/output.css') }}">
  </head>
  <body>
    <div class="flex flex-row gap-4 p-4 w-full h-screen relative bg-neutral-tertiary">
      <div class="sticky top-4 z-20 inset-s-0 border border-default rounded-base h-full bg-neutral-primary">
        hifdsfsdfsdf
      </div>
      <nav class="bg-neutral-primary sticky w-full top-4 z-20 inset -s-0 border border-default rounded-base h-fit">
        <div class="flex flex-wrap items-center justify-between mx-auto p-5 gap-4">
          <div>
            <form class="flex items-center max-w-sm mx-auto space-x-2 w-max-xs w-xs">
              <label for="simple-search" class="sr-only">Buscar</label>
              <div class="relative w-full">
                <input type="text"
                       id="simple-search"
                       class="px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium rounded-base text-heading text-sm focus:ring-brand focus:border-brand block w-full placeholder:text-body"
                       placeholder="Buscar"
                       required />
              </div>
              <button type="submit"
                      class="inline-flex items-center justify-center shrink-0 text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs rounded-base w-10 h-10 focus:outline-none">
                <svg class="w-5 h-5"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     width="24"
                     height="24"
                     fill="none"
                     viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z">
                  </path>
                </svg>
                <span class="sr-only">Icon description</span>
              </button>
            </form>
          </div>
          <div class="flex flex- gap-4">
            <div class="relative flex justify-center items-center">
              <svg class="w-6 h-6 text-gray-800 dark:text-white"
                   aria-hidden="true"
                   xmlns="http://www.w3.org/2000/svg"
                   width="24"
                   height="24"
                   fill="none"
                   viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5.365V3m0 2.365a5.338 5.338 0 0 1 5.133 5.368v1.8c0 2.386 1.867 2.982 1.867 4.175 0 .593 0 1.292-.538 1.292H5.538C5 18 5 17.301 5 16.708c0-1.193 1.867-1.789 1.867-4.175v-1.8A5.338 5.338 0 0 1 12 5.365ZM8.733 18c.094.852.306 1.54.944 2.112a3.48 3.48 0 0 0 4.646 0c.638-.572 1.236-1.26 1.33-2.112h-6.92Z">
                </path>
              </svg>
              <span class="top-2.5 left-3.5 absolute  w-3 h-3 bg-warning border-2 border-buffer rounded-full"></span>
            </div>
            <div id="avatarButton"
                 type="button"
                 data-dropdown-toggle="userDropdown"
                 data-dropdown-placement="bottom-start"
                 class="w-10 h-10 rounded-full cursor-pointer relative inline-flex items-center justify-center overflow-hidden bg-neutral-tertiary">
              <span class="font-medium text-body">JD</span>
            </div>
            <!-- Dropdown menu -->
            <div id="userDropdown"
                 class="z-10 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44">
              <div class="px-4 py-3 border-b border-default-medium text-sm text-heading">
                <div class="font-medium">John Doe</div>
                <div class="truncate">johndoe@flowbite.com</div>
              </div>
              <ul class="p-2 text-sm text-body font-medium"
                  aria-labelledby="avatarButton">
                <li>
                  <a href="#"
                     class="block w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">Dashboard</a>
                </li>
                <li>
                  <a href="#"
                     class="block w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">Perfil</a>
                </li>
                <li>
                  <a href="#"
                     class="block w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">E-commerce</a>
                </li>
                <li>
                  <a href="#"
                     class="block w-full p-2 hover:bg-neutral-tertiary-medium text-fg-danger rounded-md">Cerrar
                  Sesión</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</html>
