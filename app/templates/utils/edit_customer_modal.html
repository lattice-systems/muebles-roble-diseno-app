<!-- Modal Editar Cliente -->
<div id="editCustomerModal" tabindex="-1" aria-hidden="true"
    class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-gray-900/40">
    <div class="relative p-4 w-full max-w-2xl max-h-full">
        <div class="relative bg-white rounded-lg shadow-xl dark:bg-gray-800 border border-default-medium">
            <!-- Header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-default">
                <h3 class="text-xl font-bold text-heading dark:text-white">
                    Editar Cliente
                </h3>
                <button type="button" id="closeEditCustomerModal"
                    class="text-gray-400 bg-transparent hover:bg-neutral-secondary-medium hover:text-heading-strong rounded-lg text-sm w-8 h-8 ml-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white transition-colors">
                    <svg class="w-3 h-3 pointer-events-none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
                    </svg>
                    <span class="sr-only">Cerrar</span>
                </button>
            </div>
            <!-- Body -->
            <div class="p-4 md:p-5 space-y-4">
                <form id="editCustomerForm" action="#">
                    <input type="hidden" id="edit_customer_id" name="id">
                    <div class="grid gap-4 mb-4 sm:grid-cols-2">
                        <div>
                            <label for="edit_customer_first_name"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Nombre(s) <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="first_name" id="edit_customer_first_name"
                                class="bg-neutral-primary-soft border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Juan" required="">
                        </div>
                        <div>
                            <label for="edit_customer_last_name"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Apellidos <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="last_name" id="edit_customer_last_name"
                                class="bg-neutral-primary-soft border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Pérez" required="">
                        </div>
                        <div>
                            <label for="edit_customer_email"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Correo Electrónico
                                <span class="text-danger-strong">*</span></label>
                            <input type="email" name="email" id="edit_customer_email"
                                class="bg-neutral-primary-soft border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="correo@ejemplo.com" required="">
                        </div>
                        <div>
                            <label for="edit_customer_phone"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Teléfono <span
                                    class="text-danger-strong">*</span></label>
                            <input type="number" name="phone" id="edit_customer_phone"
                                class="bg-neutral-primary-soft border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. 1234567890" required="">
                        </div>

                        <!-- Freight toggle -->
                        <div class="sm:col-span-2 mt-2 border-t border-default pt-4">
                            <label class="inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="edit_customer_requires_freight" name="requires_freight"
                                    class="sr-only peer">
                                <div
                                    class="relative w-11 h-6 bg-neutral-secondary-strong peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-medium rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand">
                                </div>
                                <span class="ms-3 text-sm font-medium text-heading dark:text-white">¿Requiere
                                    flete?</span>
                            </label>
                        </div>
                    </div>

                    <!-- Freight specific fields -->
                    <div id="editFreightFieldsContainer"
                        class="hidden grid gap-4 mb-4 sm:grid-cols-2 bg-neutral-secondary-soft p-4 rounded-base border border-default-medium">
                        <div class="sm:col-span-2">
                            <h4 class="text-sm font-bold text-heading dark:text-white">Detalles de envío</h4>
                            <p class="text-xs text-body mb-2 dark:text-neutral-secondary">Dirección para el envío por flete.</p>
                        </div>
                        <div>
                            <label for="edit_customer_zip_code"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Código Postal <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="zip_code" id="edit_customer_zip_code" maxlength="5"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. 64000">
                        </div>
                        <div>
                            <label for="edit_customer_state"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Estado <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="state" id="edit_customer_state"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Nuevo León">
                        </div>
                        <div>
                            <label for="edit_customer_city"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Ciudad <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="city" id="edit_customer_city"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Monterrey">
                        </div>
                        <div>
                            <label for="edit_customer_neighborhood"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Colonia <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="neighborhood" id="edit_customer_neighborhood"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Centro">
                        </div>
                        <div class="sm:col-span-2">
                            <label for="edit_customer_street"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Calle <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="street" id="edit_customer_street"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. Av. Juárez">
                        </div>
                        <div>
                            <label for="edit_customer_ext_num"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Núm. Exterior <span
                                    class="text-danger-strong">*</span></label>
                            <input type="text" name="exterior_number" id="edit_customer_ext_num"
                                class="edit-freight-input bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. 123">
                        </div>
                        <div>
                            <label for="edit_customer_int_num"
                                class="block mb-2 text-sm font-medium text-heading dark:text-white">Núm. Interior
                                (Opcional)</label>
                            <input type="text" name="interior_number" id="edit_customer_int_num"
                                class="bg-white border border-default-medium text-heading text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full p-2.5 shadow-xs"
                                placeholder="Ej. A">
                        </div>
                    </div>

                    <div id="editCustomerErrorBox"
                        class="hidden flex sm:items-center p-4 mb-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft mt-3 shadow-xs"
                        role="alert">
                        <svg class="w-4 h-4 shrink-0 mt-0.5 md:mt-0" aria-hidden="true"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                        <span class="sr-only">Error</span>
                        <div class="ms-2 text-sm" id="editCustomerErrorMessage"></div>
                    </div>

                    <div class="flex justify-end gap-2 pt-2">
                        <button type="button" id="closeEditCustomerModalBtn"
                            class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" id="btnGuardarEdicion"
                            class="text-white inline-flex items-center bg-brand hover:bg-brand-strong focus:ring-4 focus:outline-none focus:ring-brand-medium shadow-sm font-semibold rounded-base text-sm px-5 py-2.5 text-center transition-colors">
                            <svg class="mr-1 -ml-1 w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                width="24" height="24" fill="none" viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2" d="m5 12 4.7 4.5 9.3-9" />
                            </svg>
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const editFreightCheckbox = document.getElementById('edit_customer_requires_freight');
        const editFreightContainer = document.getElementById('editFreightFieldsContainer');
        const editFreightInputs = document.querySelectorAll('.edit-freight-input');

        if (editFreightCheckbox) {
            editFreightCheckbox.addEventListener('change', function () {
                if (this.checked) {
                    editFreightContainer.classList.remove('hidden');
                    editFreightInputs.forEach(function (input) {
                        input.setAttribute('required', 'required');
                    });
                } else {
                    editFreightContainer.classList.add('hidden');
                    editFreightInputs.forEach(function (input) {
                        input.removeAttribute('required');
                    });
                }
            });
        }
    });
</script>
