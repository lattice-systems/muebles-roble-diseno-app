<!-- Modal de Checkout / Confirmar Cobro -->
<div id="checkoutModal"
     tabindex="-1"
     aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-gray-900/40">
  <div class="relative p-4 w-full max-w-xl max-h-full">
    <div class="relative bg-white rounded-lg shadow-xl border border-default-medium">
      <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t border-default">
        <h3 class="text-xl font-bold text-heading">Confirmar Cobro</h3>
        <button id="closeCheckoutModalTop"
                type="button"
                class="text-gray-400 bg-transparent hover:bg-neutral-secondary-medium hover:text-heading-strong rounded-lg text-xs 2xl:text-sm w-8 h-8 ml-auto inline-flex justify-center items-center transition-colors"
                aria-label="Cerrar modal">
          <svg class="w-3 h-3 pointer-events-none"
               aria-hidden="true"
               xmlns="http://www.w3.org/2000/svg"
               fill="none"
               viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
          </svg>
        </button>
      </div>
      <div class="p-4 md:p-5 space-y-4">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="sm:col-span-2 flex items-center justify-between text-base font-semibold text-heading">
            <span>Total a pagar:</span>
            <span id="modalTotalDisplay">$0.00</span>
          </div>
          <div id="modalFreightNoteRow"
               class="hidden sm:col-span-2 flex-col gap-1.5 text-xs 2xl:text-sm text-heading bg-neutral-secondary-soft rounded-base px-3 py-2 border border-default-medium">
            <div class="flex items-center justify-between pb-1 border-b border-default-medium">
              <span class="flex items-center gap-1 font-semibold text-brand">
                <svg class="w-4 h-4"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     fill="none"
                     viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h6l2 4m-8-4v8m0-8V6a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v9h2m8 0H9m4 0h2m4 0h2v-4m0 0h-5m3.5 5.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Zm-10 0a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Z" />
                </svg>
                Información de Entregas y Envíos
              </span>
            </div>
            <div class="flex flex-col gap-1 pt-1 text-body">
              <div class="flex justify-between items-center">
                <span id="modalFreightStatusText">No aplica envío (entrega inmediata)</span>
                <span id="modalFreightCost" class="font-medium text-heading">$0.00</span>
              </div>
              <div class="flex justify-between items-center text-xs 2xl:text-sm">
                <span>Fecha Estimada de Entrega:</span>
                <span id="modalDeliveryDateDisplay" class="font-semibold text-heading">-</span>
              </div>
            </div>
          </div>
          <div class="sm:col-span-2">
            <label for="paymentMethodSelect"
                   class="block mb-2 text-xs 2xl:text-sm font-medium text-heading">
              Metodo de
              pago
            </label>
            <select id="paymentMethodSelect"
                    class="bg-neutral-primary-soft border border-default-medium text-heading text-xs 2xl:text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full px-3 py-2 2xl:py-2.5 shadow-xs">
              <option value="">Selecciona una opcion</option>
            </select>
          </div>
          <div class="sm:col-span-2" id="amountGivenWrapper">
            <label for="amountGivenInput"
                   class="block mb-2 text-xs 2xl:text-sm font-medium text-heading">
              Monto
              recibido
            </label>
            <input type="number"
                   id="amountGivenInput"
                   min="0"
                   step="0.01"
                   class="bg-neutral-primary-soft border border-default-medium text-heading text-xs 2xl:text-sm rounded-base focus:ring-brand-medium focus:border-brand block w-full px-3 py-2 2xl:py-2.5 shadow-xs"
                   placeholder="0.00">
            <p id="amountLockedHint" class="hidden mt-1.5 text-xs text-body italic">
              El monto se establece automáticamente para pagos con tarjeta o transferencia.
            </p>
          </div>
          <div class="sm:col-span-2 flex items-center justify-between text-sm text-body border-t border-default pt-3">
            <span>Cambio:</span>
            <span id="modalChangeDisplay" class="font-semibold text-heading">$0.00</span>
          </div>
        </div>
        <div id="checkoutErrorBox"
             class="hidden items-center p-3 2xl:p-4 text-xs 2xl:text-sm text-fg-danger-strong rounded-base bg-danger-soft shadow-xs"
             role="alert">
          <svg class="w-4 h-4 shrink-0 mt-0.5 md:mt-0"
               aria-hidden="true"
               xmlns="http://www.w3.org/2000/svg"
               width="24"
               height="24"
               fill="none"
               viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
          <span class="sr-only">Error</span>
          <div class="ms-2 text-sm" id="checkoutErrorMessage"></div>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button"
                  data-modal-hide="checkoutModal"
                  class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-xs 2xl:text-sm px-2.5 py-1.5 2xl:px-4 2xl:py-2.5 focus:outline-none">
            Cancelar
          </button>
          <button type="button"
                  id="btnProcesarPago"
                  class="text-white bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-xs 2xl:text-sm px-3 py-1.5 2xl:px-5 2xl:py-2.5 focus:outline-none">
            Confirmar Pago
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
